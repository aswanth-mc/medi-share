{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'css/unit/registration.css' %}">
     <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>
    <header class="auth-header">
    <div class="header-container">
        <a href="{% url 'register_choice' %}" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            <span>Back</span>
        </a>
        <div class="logo-small">Medi-Share</div>
    </div>
</header>
    
    <div class="auth-wrapper">
        <div class="registration-card">
            <div class="card-header">
                <h2>Palliative Unit Registration</h2>
                <p>Join the Medi-Share network to support those in need.</p>
            </div>

            {% if error %}
                <p class="form-error" role="alert">{{ error }}</p>
            {% endif %}
    
            <form method="POST" enctype="multipart/form-data" class="grid-form">
                {% csrf_token %}
    
                <div class="form-group full-width">
                    <label>Unit Name</label>
                    <input name="name" type="text" placeholder="e.g. Kozhikode Central Palliative" required>
                </div>
    
                <div class="form-group">
                    <label>Email Address</label>
                    <input name="email" type="email" placeholder="unit@example.com" required>
                </div>
    
                <div class="form-group">
                    <label>Password</label>
                    <input name="password" type="password" placeholder="••••••••" required>
                </div>
    
                <div class="form-group">
                    <label>License Number</label>
                    <input name="license_number" type="text" placeholder="GOV-XXXX-XXXX" required>
                </div>
    
                <div class="form-group">
                    <label>Verification Document (PDF)</label>
                    <input type="file" name="license_file" class="file-input" required>
                </div>
    
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" name="phone" placeholder="+91 XXXXX XXXXX" required>
                </div>
    
                <div class="location-section">

    <label>Select Location</label>

    <div id="map"></div>

    <input type="text"
           name="location_name"
           id="location_name"
           readonly>

    <input type="hidden"
           name="latitude"
           id="latitude">

    <input type="hidden"
           name="longitude"
           id="longitude">

</div>

    
                <button type="submit" class="btn-submit">Register Unit</button>
            </form>
            
            <div class="card-footer">
                <p>Already registered? <a href="{% url 'login' %}">Login here</a></p>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="{% static 'js/map/locationPicker.js' %}"></script>
</body>
</html>
