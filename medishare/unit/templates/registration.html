{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Unit Registration</title>

    <link rel="stylesheet"
          href="{% static 'css/unit/registration.css' %}">

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet/dist/leaflet.css"/>

</head>

<body>

<div class="container">

    <div class="card">

        <h1>Palliative Unit Registration</h1>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST"
              enctype="multipart/form-data">

            {% csrf_token %}

            <input type="text"
                   name="name"
                   placeholder="Unit Name"
                   required>

            <input type="email"
                   name="email"
                   placeholder="Email"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <input type="text"
                   name="phone"
                   placeholder="Phone Number"
                   required>

            <input type="text"
                   name="license_number"
                   placeholder="License Number"
                   required>

            <input type="file"
                   name="license_file"
                   required>

            <div id="map"></div>

            <input type="text"
                   name="location_name"
                   id="location_name"
                   readonly
                   placeholder="Selected Location">

            <input type="hidden"
                   name="latitude"
                   id="latitude">

            <input type="hidden"
                   name="longitude"
                   id="longitude">

            <button type="submit">
                Register Unit
            </button>

        </form>

    </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module" src="{% static 'js/map/locationPicker.js' %}"></script>

</body>
</html>
