{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Medicine</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="{% static 'css/user/request_medicine.css' %}">
</head>
<body>

<div class="container">
    <div class="form-card">
        <h2>Request Medicine</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Medicine Name</label>
                <input type="text" name="medicine_name" placeholder="Enter medicine name" required>
            </div>

            <div class="form-group">
                <label>Quantity</label>
                <input type="number" name="quantity" placeholder="Enter quantity" required>
            </div>

            <div class="form-group">
                <label>Category</label>
                <select name="category" required>
                    <option value="">Select Category</option>
                    <option value="tablet">Tablet</option>
                    <option value="syrup">Syrup</option>
                    <option value="injection">Injection</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Description (Optional)</label>
                <textarea name="description" placeholder="Add extra details..."></textarea>
            </div>

            <button type="submit">Submit Request</button>
        </form>

        <div class="footer">
            <a href="{% url 'user_dashboard' %}">← Back to Dashboard</a>
        </div>
    </div>
</div>

</body>
</html>
