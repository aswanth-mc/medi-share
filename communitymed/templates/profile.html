{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>

    <link rel="stylesheet"
          href="{% static 'css/profile.css' %}">
</head>
<body>

<div class="profile-container">

    <div class="profile-card">

        <div class="profile-header">

            <div class="profile-avatar">
                {{ user_obj.username|first|upper }}
            </div>

            <div>

                <h2>
                    {{ user_obj.first_name }}
                    {{ user_obj.last_name }}
                </h2>

                <p>@{{ user_obj.username }}</p>

            </div>

        </div>

        <div class="profile-details">

            <div class="detail-box">
                <label>Email</label>
                <p>{{ user_obj.email }}</p>
            </div>

            <div class="detail-box">
                <label>Phone</label>
                <p>{{ user_obj.phone }}</p>
            </div>

            <div class="detail-box">
                <label>Location</label>
                <p>{{ user_obj.location_name }}</p>
            </div>

            <div class="detail-box">
                <label>Role</label>
                <p>{{ user_obj.role }}</p>
            </div>

        </div>

    </div>

</div>

</body>
</html>
